<!DOCTYPE html>

		<title>Cetak Dokumen</title>
		<style>
			body {
				font-family: Arial, sans-serif;
				margin: 20px auto;
				max-width: 1000px;
			}
			table {
				border-collapse: collapse;
				width: 100%;
			}
			table,
			th,
			td {
				border: 1px solid #ccc;
			}
			th,
			td {
				padding: 8px;
				vertical-align: top;
				word-wrap: break-word;
				text-align: left;
			}
			table th:first-child,
			table td:first-child {
				width: 180px;
				padding-right: 5px;
				white-space: nowrap;
			}
			table th:last-child,
			table td:last-child {
				width: auto;
				padding-left: 5px;
			}
			textarea,
			input,
			select,
			button {
				font-size: 14px;
				padding: 6px;
				width: 100%;
				box-sizing: border-box;
				font-family: Arial, sans-serif;
				border: 1px solid #999;
				border-radius: 3px;
				resize: vertical;
			}
			textarea {
				min-height: 50px;
			}
			.section {
				margin-bottom: 20px;
			}
			.btn-group {
				margin-top: 10px;
				text-align: center;
			}
			.btn-group button,
			.btn-group input {
				width: auto;
				padding: 10px 20px;
				margin: 0 5px;
				font-size: 16px;
				cursor: pointer;
			}
			.section label {
				display: inline-block;
				margin-bottom: 6px;
				font-weight: bold;
			}
			.section select,
			.section textarea {
				margin-bottom: 15px;
			}
			table tr:nth-child(even) {
				background-color: #f9f9f9;
			}
			table tr:nth-child(odd) {
				background-color: #ffffff;
			}
			table th {
				background-color: #eaeaea;
			}
			.copy-btn {
				width: auto !important;      /* override width global */
				padding: 4px 10px;           /* ukuran kecil */
				font-size: 13px;
				border: 1px solid #999;
				border-radius: 3px;
				background-color: #eee;
				cursor: pointer;
			}
				.copy-btn:hover {
				background-color: #ddd;
			}
		</style>

			// update template dropdown
			function updateTemplateOptions(kategori) {
				templateSelect.innerHTML = '<option value="">-- Pilih Template --</option>';
				if (templates[kategori]) {
					templates[kategori].forEach((tpl) => {
						const option = document.createElement('option');
						option.value = tpl;
						option.textContent = tpl;
						templateSelect.appendChild(option);
					});
					templateSelect.disabled = false;
				} else {
					templateSelect.disabled = true;
				}
			}

			kategoriSelect.addEventListener('change', function () {
				updateTemplateOptions(this.value);
				localStorage.setItem('kategori', this.value);
			});

			window.addEventListener('DOMContentLoaded', function () {
				const savedKategori = localStorage.getItem('kategori');
				if (savedKategori) {
					kategoriSelect.value = savedKategori;
					updateTemplateOptions(savedKategori);
				}
			});

			document.getElementById('btnCetak').addEventListener('click', function () {
				const kategori = kategoriSelect.value;
				const template = templateSelect.value;

				if (!kategori || !template) {
					alert('Silakan pilih kategori dan template terlebih dahulu.');
					return;
				}

				const rtfFile = templateFiles[template];
				if (!rtfFile) {
					alert('File RTF untuk template ini tidak ditemukan.');
					return;
				}

				const data = {};
				const inputs = document.querySelectorAll('input, textarea');
				inputs.forEach((input) => {
					const id = input.id;
					const value = input.value;
					if (id) {
						data[id] = value
							.trim()
							.replace(/\r\n/g, '\n')
							.replace(/^[ \t]+/gm, '')
							.replace(/\n{2,}/g, '\n')
							.replace(/\\/g, '\\\\')
							.replace(/{/g, '\\{')
							.replace(/}/g, '\\}')
							.replace(/\n/g, '\\par ');
					}
				});

				fetch(`templates/${rtfFile}`)
					.then((response) => {
						if (!response.ok) {
							throw new Error('Gagal membaca file template.');
						}
						return response.text();
					})
					.then((fileContent) => {
						const modifiedContent = fileContent.replace(/\#([\s\S]*?)\#/g, (match, inner) => {
							let cleaned = inner
								.replace(/\\'[0-9a-f]{2}/gi, '')
								.replace(/\\u-?\d+\??/gi, '')
								.replace(/\\[a-z]+-?\d*\s*/gi, '')
								.replace(/[{}]/g, '')
								.replace(/\s+/g, ' ')
								.trim();

							const candidates = (cleaned.match(/\d{2,}/g) || []).sort((a, b) => b.length - a.length);

							for (const key of candidates) {
								if (Object.prototype.hasOwnProperty.call(data, key)) {
									return data[key];
								}
							}

							if (Object.prototype.hasOwnProperty.call(data, cleaned)) {
								return data[cleaned];
							}

							return match;
						});

						const blob = new Blob([modifiedContent], { type: 'application/rtf' });
						const downloadUrl = window.URL.createObjectURL(blob);

						const a = document.createElement('a');
						a.href = downloadUrl;
						a.download = ((data['0001'] || 'dokumen').match(/^\d+/)?.[0] || 'dokumen') + '.rtf';
						document.body.appendChild(a);
						a.click();
						document.body.removeChild(a);

						window.URL.revokeObjectURL(downloadUrl);
					})
					.catch((error) => {
						console.error(error);
						alert('Terjadi kesalahan saat memproses file RTF.');
					});
			});

			async function fetchDataFromUrl(url) {
				let loading;
				try {
					let dots = '';
					tabelContainer.innerHTML = `<p>Loading${dots}</p>`;
					document.getElementById('dataTableSection').style.display = 'block';
					btnGroup.style.display = 'none';

					const btnTampilkan = document.getElementById('btnTampilkan');
					btnTampilkan.disabled = true;

					loading = setInterval(() => {
						dots += '.';
						if (dots.length > 3) dots = '';
						tabelContainer.innerHTML = `<p>Loading${dots}</p>`;
					}, 500);

					const proxy = 'https://cors-anywhere.herokuapp.com/';
					const response = await fetch(proxy + url);
					if (!response.ok) {
						throw new Error('Gagal mengambil data dari URL.');
					}

					const htmlText = await response.text();
					const parser = new DOMParser();
					const doc = parser.parseFromString(htmlText, 'text/html');
					return doc;
				} catch (error) {
					console.error(error);
					return;
				} finally {
					clearInterval(loading);
					btnTampilkan.disabled = false;
				}
			}

			async function populateTableFromInput(template) {
				const input = jsonLinkInput.value;

				let data;
				try {
					data = JSON.parse(input);
				} catch (error) {
					const doc = await fetchDataFromUrl(input);
					if (!doc) return;

					tabelContainer.innerHTML = tabelTemplates[template];
					document.getElementById('dataTableSection').style.display = 'block';
					btnGroup.style.display = 'block';

					const inputs = doc.querySelectorAll('input, textarea');
					inputs.forEach((input) => {
						const id = input.id;
						const value = input.value;

						const targetElement = document.getElementById(id);
						if (targetElement) {
							targetElement.value = value;
						}
					});

					return true;
				}

				tabelContainer.innerHTML = tabelTemplates[template];
				document.getElementById('dataTableSection').style.display = 'block';
				btnGroup.style.display = 'block';

				Object.keys(data).forEach((key) => {
					const targetElement = document.getElementById(key);
					if (targetElement) {
						targetElement.value = data[key];
					}
				});

				return true;
			}

			document.getElementById('btnTampilkan').addEventListener('click', async function () {
				const kategori = kategoriSelect.value;
				const template = templateSelect.value;
				const link = jsonLinkInput.value;

				if (!kategori) {
					tabelContainer.innerHTML = '<p>Silakan pilih kategori terlebih dahulu.</p>';
					document.getElementById('dataTableSection').style.display = 'block';
					btnGroup.style.display = 'none';
					return;
				}
				if (!template) {
					tabelContainer.innerHTML = '<p>Silakan pilih template terlebih dahulu.</p>';
					document.getElementById('dataTableSection').style.display = 'block';
					btnGroup.style.display = 'none';
					return;
				}
				if (!tabelTemplates[template]) {
					tabelContainer.innerHTML = '<p>Tabel template belum tersedia.</p>';
					document.getElementById('dataTableSection').style.display = 'block';
					btnGroup.style.display = 'none';
					return;
				}
				if (!link) {
					tabelContainer.innerHTML = '<p>Silakan masukkan data terlebih dahulu.</p>';
					document.getElementById('dataTableSection').style.display = 'block';
					btnGroup.style.display = 'none';
					return;
				}

				if ((await populateTableFromInput(template)) === undefined) {
					tabelContainer.innerHTML = '<p>Terjadi kesalahan saat memproses input.</p>';
					document.getElementById('dataTableSection').style.display = 'block';
					btnGroup.style.display = 'none';
					return;
				}
			});
			
			
			
			
		function append_amar() {
        const select = document.getElementById("pilih_amar");
        const textarea = document.getElementById("0065");

        if (select.value) {
          // Pecah isi textarea jadi array baris
          let lines = textarea.value.split("\n");

          // Pastikan minimal ada 4 baris
          while (lines.length < 4) {
            lines.push("");
          }

          // Sisipkan pilihan pada baris ke-4 (index 3)
          lines.splice(3, 0, select.value);

          // Gabung kembali jadi string
          textarea.value = lines.join("\n");
        }

        // Reset dropdown
        select.value = "";
      }
